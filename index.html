<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart | Fresh Grocery</title>
    <style>
        /* --- BRAND THEME --- */
        :root { 
            --primary-green: #28a745; 
            --brand-yellow: #ffc107; 
            --bg-light: #fffdf0; /* बहुत ही हल्का पीला बैकग्राउंड */
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; padding-bottom: 80px; }
        
        /* Header */
        .header { background: var(--primary-green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: bold; font-size: 22px; }
        
        /* Banner */
        .banner { background: var(--brand-yellow); margin: 15px; padding: 20px; border-radius: 15px; text-align: center; color: #333; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 12px; text-align: center; border: 1px solid #e0e0e0; transition: 0.3s; }
        .card:hover { border-color: var(--primary-green); }
        .card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        
        /* Buttons */
        .btn-add { background: var(--primary-green); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-checkout { background: var(--brand-yellow); color: #000; position: fixed; bottom: 15px; width: 92%; left: 4%; padding: 15px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Soni Mart</div>
    <div>🛒 <span id="cart-count">0</span></div>
</div>

<div class="banner">
    ✨ Daily Essentials at your doorstep in 30 Minutes!
</div>

<div id="product-list" class="grid"></div>

<button class="btn-checkout" onclick="checkout()">Proceed to Order (via Email)</button>

<script>
    // डेटा को यहाँ से मैनेज करें
    const ADMIN_EMAIL = "prinsplayhelp@gmail.com"; 
    let cart = [];
    
    // डमी प्रोडक्ट्स (आप इसे API से भी ले सकते हैं)
    const products = [
        {name: "Fresh Broccoli", price: 60, image: "https://via.placeholder.com/150"},
        {name: "Red Apple", price: 120, image: "https://via.placeholder.com/150"},
        {name: "Fresh Milk", price: 56, image: "https://via.placeholder.com/150"},
        {name: "Tomato", price: 20, image: "https://via.placeholder.com/150"}
    ];

    function render() {
        const list = document.getElementById("product-list");
        list.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.image}">
                <p style="font-weight:bold;">${p.name}</p>
                <p>₹${p.price}</p>
                <button class="btn-add" onclick="addToCart('${p.name}', ${p.price})">Add</button>
            </div>
        `).join('');
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
    }

    function checkout() {
        if(cart.length === 0) return alert("Cart is empty!");
        const body = "Order Items: " + cart.map(i => i.name).join(", ") + " | Total Amount: ₹" + cart.reduce((s, i) => s + i.price, 0);
        window.location.href = `mailto:${ADMIN_EMAIL}?subject=New Order!&body=${encodeURIComponent(body)}`;
    }

    render();
</script>
</body>
</html>
