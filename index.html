<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart | Official Enterprise App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#FACC15' } } } }
    </script>
</head>
<body class="bg-gray-50 pb-28">

    <!-- Header -->
    <header class="sticky top-0 bg-white p-4 shadow-sm z-50 flex justify-between items-center">
        <h1 class="text-2xl font-black text-primary">SONI MART</h1>
        <div class="bg-black text-white px-4 py-2 rounded-full font-bold text-sm">
            <i class="fas fa-bag-shopping"></i> <span id="cart-count">0</span>
        </div>
    </header>

    <!-- Banner -->
    <div class="p-4">
        <div class="bg-primary p-6 rounded-3xl font-black text-xl shadow-lg">Daily Essentials in 10 Mins!</div>
    </div>

    <!-- Category Filter -->
    <div class="flex gap-3 px-4 mb-4 overflow-x-auto">
        <button onclick="renderProducts('All')" class="bg-black text-white px-5 py-2 rounded-full font-bold">All</button>
        <button onclick="renderProducts('Fruits')" class="bg-white border px-5 py-2 rounded-full font-bold">Fruits</button>
        <button onclick="renderProducts('Vegetables')" class="bg-white border px-5 py-2 rounded-full font-bold">Vegetables</button>
    </div>

    <!-- Product Grid -->
    <div id="product-grid" class="grid grid-cols-2 gap-4 p-4"></div>

    <!-- Sticky Checkout Bar -->
    <div id="checkout-bar" class="fixed bottom-0 w-full bg-white p-4 border-t shadow-2xl flex justify-between items-center hidden">
        <div>
            <p class="text-xs text-gray-500">Total Bill</p>
            <p class="font-black text-lg" id="total-price">₹0</p>
        </div>
        <button onclick="alert('Proceeding to Payment...')" class="bg-primary px-8 py-3 rounded-2xl font-black">CHECKOUT</button>
    </div>

    <script>
        const products = [
            {id: 1, name: "Apple", cat: "Fruits", price: 120},
            {id: 2, name: "Broccoli", cat: "Vegetables", price: 60},
            {id: 3, name: "Tomato", cat: "Vegetables", price: 20},
            {id: 4, name: "Milk", cat: "Dairy", price: 56}
        ];
        let cart = {};

        function renderProducts(cat) {
            const grid = document.getElementById('product-grid');
            const data = cat === 'All' ? products : products.filter(p => p.cat === cat);
            grid.innerHTML = data.map(p => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border">
                    <div class="h-20 bg-gray-100 rounded-2xl mb-3"></div>
                    <h3 class="font-bold">${p.name}</h3>
                    <p class="text-sm text-gray-500 mb-3">₹${p.price}</p>
                    <div class="flex items-center gap-3 border-t pt-3">
                        <button onclick="updateCart(${p.id}, -1)" class="w-8 h-8 bg-gray-200 rounded-full">-</button>
                        <span id="qty-${p.id}" class="font-black">0</span>
                        <button onclick="updateCart(${p.id}, 1)" class="w-8 h-8 bg-primary rounded-full">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateCart(id, change) {
            cart[id] = Math.max(0, (cart[id] || 0) + change);
            document.getElementById(`qty-${id}`).innerText = cart[id];
            let total = 0, count = 0;
            products.forEach(p => { if(cart[p.id]) { total += cart[p.id] * p.price; count += cart[p.id]; } });
            document.getElementById('cart-count').innerText = count;
            document.getElementById('total-price').innerText = '₹' + total;
            document.getElementById('checkout-bar').classList.toggle('hidden', count === 0);
        }
        renderProducts('All');
    </script>
</body>
</html>
