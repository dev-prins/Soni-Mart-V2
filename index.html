<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart | Official Enterprise App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 pb-32">

    <!-- Navbar -->
    <nav class="sticky top-0 bg-white p-4 flex justify-between items-center shadow-sm z-50">
        <div class="font-black text-2xl tracking-tighter text-green-700">SONI MART</div>
        <button onclick="document.getElementById('cart-section').classList.remove('hidden')" class="bg-green-100 px-4 py-2 rounded-xl font-bold">
            <i class="fas fa-cart-shopping"></i> <span id="cart-count">0</span>
        </button>
    </nav>

    <!-- Category Strip -->
    <div class="flex gap-2 p-4 overflow-x-auto scrollbar-hide">
        <button onclick="loadProducts('All')" class="bg-green-600 text-white px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap">All Items</button>
        <button onclick="loadProducts('Fruits')" class="bg-white border px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap">Fruits</button>
        <button onclick="loadProducts('Vegetables')" class="bg-white border px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap">Vegetables</button>
        <button onclick="loadProducts('Dairy')" class="bg-white border px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap">Dairy</button>
    </div>

    <!-- Product Container -->
    <div id="product-list" class="grid grid-cols-2 gap-4 p-4"></div>

    <!-- Sticky Bottom Checkout -->
    <div id="checkout-bar" class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-between items-center hidden z-40">
        <div>
            <p class="text-xs text-gray-500">Total Price</p>
            <p class="font-black text-lg" id="total-price">₹0</p>
        </div>
        <button onclick="processOrder()" class="bg-yellow-400 px-8 py-3 rounded-2xl font-black">PROCEED TO PAY</button>
    </div>

    <!-- Scripting Engine -->
    <script>
        const inventory = [
            {id: 1, name: "Broccoli", cat: "Vegetables", price: 60},
            {id: 2, name: "Apple", cat: "Fruits", price: 120},
            {id: 3, name: "Milk", cat: "Dairy", price: 56},
            {id: 4, name: "Tomato", cat: "Vegetables", price: 20}
        ];

        let cart = {};

        function loadProducts(cat) {
            const list = document.getElementById('product-list');
            const data = cat === 'All' ? inventory : inventory.filter(i => i.cat === cat);
            list.innerHTML = data.map(item => `
                <div class="bg-white p-4 rounded-3xl custom-shadow border border-gray-100">
                    <div class="h-24 bg-gray-50 rounded-2xl mb-3"></div>
                    <h3 class="font-bold text-sm">${item.name}</h3>
                    <p class="text-xs text-gray-500 mb-4">₹${item.price}</p>
                    <div class="flex items-center justify-between border-t pt-3">
                        <button onclick="adjust(${item.id}, -1)" class="w-8 h-8 rounded-full bg-gray-100">-</button>
                        <span id="qty-${item.id}" class="font-bold">0</span>
                        <button onclick="adjust(${item.id}, 1)" class="w-8 h-8 rounded-full bg-green-600 text-white">+</button>
                    </div>
                </div>
            `).join('');
        }

        function adjust(id, change) {
            cart[id] = Math.max(0, (cart[id] || 0) + change);
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateStats();
        }

        function updateStats() {
            let total = 0, count = 0;
            inventory.forEach(i => {
                if(cart[i.id]) {
                    total += cart[i.id] * i.price;
                    count += cart[i.id];
                }
            });
            document.getElementById('cart-count').innerText = count;
            document.getElementById('total-price').innerText = '₹' + total;
            document.getElementById('checkout-bar').classList.toggle('hidden', count === 0);
        }

        function processOrder() {
            alert("Order Flow Triggered: Connecting to Secure Payment/WhatsApp API...");
        }

        loadProducts('All');
    </script>
</body>
</html>
