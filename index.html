<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart | Official Enterprise App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #FACC15; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
        .hide { display: none; }
        .section { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <!-- 1. LOGIN SCREEN -->
    <div id="login-section" class="section fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6">
        <h1 class="text-5xl font-black mb-10">SONI <span class="text-primary">MART</span></h1>
        <input type="tel" placeholder="Mobile Number" class="w-full p-4 border-2 border-gray-200 rounded-2xl mb-4">
        <button onclick="showApp()" class="w-full bg-black text-white p-4 rounded-2xl font-bold">LOGIN / SIGNUP</button>
    </div>

    <!-- 2. MAIN APP CONTENT -->
    <div id="main-app" class="section hide pb-24">
        <!-- Navbar -->
        <header class="bg-white p-4 sticky top-0 shadow-sm z-50 flex justify-between items-center">
            <h2 class="text-xl font-black">SONI MART</h2>
            <button onclick="toggleSection('profile-section')" class="text-2xl"><i class="fas fa-user-circle"></i></button>
        </header>

        <!-- Categories -->
        <div class="flex gap-2 p-4 overflow-x-auto">
            <button onclick="filter('All')" class="px-5 py-2 bg-black text-white rounded-full">All</button>
            <button onclick="filter('Fruits')" class="px-5 py-2 bg-white border rounded-full">Fruits</button>
            <button onclick="filter('Vegetables')" class="px-5 py-2 bg-white border rounded-full">Vegetables</button>
        </div>

        <!-- Products -->
        <div id="product-grid" class="grid grid-cols-2 gap-4 p-4"></div>
    </div>

    <!-- 3. PROFILE SETTINGS -->
    <div id="profile-section" class="section hide p-6">
        <h2 class="text-2xl font-black mb-6">Settings</h2>
        <div class="bg-white p-6 rounded-3xl shadow-sm">
            <p class="py-4 border-b">Edit Profile</p>
            <p class="py-4 border-b">My Orders</p>
            <p class="py-4 border-b" onclick="toggleSection('main-app')">Back to Home</p>
        </div>
    </div>

    <!-- 4. FOOTER / CART -->
    <div id="cart-footer" class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-between items-center hide z-50">
        <div class="font-bold">Total: <span id="total-val">₹0</span></div>
        <button class="bg-primary px-8 py-3 rounded-2xl font-black">PROCEED TO PAY</button>
    </div>

    <script>
        const inventory = [
            {id: 1, name: "Fresh Apple", cat: "Fruits", price: 120},
            {id: 2, name: "Broccoli", cat: "Vegetables", price: 60},
            {id: 3, name: "Milk", cat: "Dairy", price: 50}
        ];
        let cart = {};

        function showApp() {
            document.getElementById('login-section').classList.add('hide');
            document.getElementById('main-app').classList.remove('hide');
            filter('All');
        }

        function toggleSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hide'));
            document.getElementById(id).classList.remove('hide');
        }

        function filter(cat) {
            const grid = document.getElementById('product-grid');
            const items = cat === 'All' ? inventory : inventory.filter(i => i.cat === cat);
            grid.innerHTML = items.map(p => `
                <div class="bg-white p-4 rounded-3xl border">
                    <h3 class="font-bold">${p.name}</h3>
                    <p class="text-gray-500 mb-4">₹${p.price}</p>
                    <div class="flex justify-between items-center bg-gray-100 p-2 rounded-xl">
                        <button onclick="mod(${p.id}, -1)">-</button>
                        <span id="q-${p.id}">0</span>
                        <button onclick="mod(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function mod(id, val) {
            cart[id] = Math.max(0, (cart[id] || 0) + val);
            document.getElementById(`q-${id}`).innerText = cart[id];
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            inventory.forEach(i => total += (cart[i.id] || 0) * i.price);
            document.getElementById('total-val').innerText = '₹' + total;
            document.getElementById('cart-footer').classList.toggle('hide', total === 0);
        }
    </script>
</body>
</html>
