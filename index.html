<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-20">
    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-black">SONI MART</h1>
        <i class="fas fa-shopping-cart"></i>
    </header>

    <main id="product-grid" class="p-4 grid grid-cols-2 gap-4"></main>

    <script>
        async function fetchProducts() {
            try {
                // Backend se data fetch karein
                const response = await fetch('/api/products');
                const products = await response.json();
                const grid = document.getElementById('product-grid');
                grid.innerHTML = products.map(p => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm">
                        <h3 class="font-bold">${p.name}</h3>
                        <p class="text-sm text-gray-500">₹${p.price}</p>
                        <button class="w-full bg-yellow-400 mt-2 py-2 rounded-xl font-bold text-sm">ADD</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Backend error:", err);
            }
        }
        fetchProducts();
    </script>
</body>
</html>
