<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart - Ultimate Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; text-align: center; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; width: 90%; }
        .btn-add { background: #28a745; color: white; border: none; cursor: pointer; }
        .btn-del { background: #dc3545; color: white; border: none; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- Admin Section -->
    <div class="card" id="login-section">
        <h2>🔐 Admin Panel</h2>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button onclick="checkAdmin()">Login</button>
    </div>

    <div class="card hidden" id="admin-controls">
        <h2>⚙️ Manage Products</h2>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="number" id="pPrice" placeholder="Price">
        <input type="text" id="pCat" placeholder="Category">
        <input type="text" id="pImg" placeholder="Image URL">
        <button class="btn-add" onclick="addProduct()">Add Product</button>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- Cart -->
    <div class="card">
        <h2>🛒 My Cart</h2>
        <div id="cart-items">No items in cart.</div>
        <p><strong>Total: ₹ <span id="cart-total">0</span></strong></p>
        <a id="whatsapp-link" href="#" class="hidden" target="_blank" style="padding:10px; background:#25d366; color:white; text-decoration:none; border-radius:5px; display:block; text-align:center;">Order via WhatsApp</a>
    </div>

    <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()" style="width: 95%; padding: 10px;">
    <h1>Store Products</h1>
    <div class="product-grid" id="product-list">Loading...</div>
</div>

<script>
    let allProducts = [], cart = [];
    const API = "https://soni-mart-web.onrender.com";

    async function fetchProducts() {
        const res = await fetch(`${API}/get-products`);
        allProducts = await res.json();
        render(allProducts);
    }

    function render(arr) {
        const list = document.getElementById("product-list");
        list.innerHTML = arr.map(p => `
            <div class="product-card">
                <img src="${p.image || 'https://via.placeholder.com/150'}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p>₹ ${p.price}</p>
                <button onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
                <button class="btn-del admin-only hidden" onclick="deleteProduct('${p.id}')">Delete</button>
            </div>
        `).join('');
    }

    function checkAdmin() {
        if(document.getElementById("adminPass").value === "soni123") {
            document.getElementById("admin-controls").classList.remove("hidden");
            document.getElementById("login-section").classList.add("hidden");
            document.querySelectorAll(".admin-only").forEach(el => el.classList.remove("hidden"));
        } else alert("Wrong Password!");
    }

    function logout() { location.reload(); }

    function addToCart(name, price) {
        let item = cart.find(i => i.name === name);
        item ? item.qty++ : cart.push({ name, price, qty: 1 });
        updateCart();
    }

    function updateCart() {
        const list = document.getElementById("cart-items");
        const total = document.getElementById("cart-total");
        list.innerHTML = cart.map(i => `${i.name} (x${i.qty}) - ₹${i.price * i.qty}`).join("<br>");
        const sum = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        total.innerText = sum;
        const link = document.getElementById("whatsapp-link");
        if(sum > 0) {
            link.classList.remove("hidden");
            link.href = `https://wa.me/91YOURNUMBER?text=Order: ${cart.map(i => i.name+' x'+i.qty).join(', ')}. Total: ₹${sum}`;
        }
    }

    async function addProduct() {
        const data = { 
            name: document.getElementById("pName").value, 
            price: document.getElementById("pPrice").value, 
            category: document.getElementById("pCat").value,
            image: document.getElementById("pImg").value
        };
        await fetch(`${API}/add-product`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(data) });
        fetchProducts();
    }

    async function deleteProduct(id) {
        await fetch(`${API}/delete-product/${id}`, { method: 'DELETE' });
        fetchProducts();
    }

    function filterProducts() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        render(allProducts.filter(p => p.name.toLowerCase().includes(query)));
    }

    fetchProducts();
</script>
</body>
</html>
