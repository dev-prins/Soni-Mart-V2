<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart - Pro Store</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .admin-section, .cart-section, .search-section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-container { display: flex; flex-wrap: wrap; gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 10px; width: 200px; text-align: center; border: 1px solid #ddd; }
        .qty-btn { padding: 5px 10px; cursor: pointer; }
        .whatsapp-btn { background: #25d366; color: white; padding: 10px; display: block; text-decoration: none; text-align: center; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Admin Login Section -->
    <div class="admin-section">
        <h2>Admin Panel</h2>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <div id="adminControls" style="display:none;">
            <input type="text" id="pName" placeholder="Name">
            <input type="number" id="pPrice" placeholder="Price">
            <input type="text" id="pCat" placeholder="Category (e.g., Electronics)">
            <button onclick="addProduct()">Add Product</button>
        </div>
        <button onclick="checkAdmin()">Login</button>
    </div>

    <!-- Cart Section -->
    <div class="cart-section">
        <h2>🛒 My Cart</h2>
        <div id="cart-items">Empty</div>
        <p><strong>Total: ₹ <span id="cart-total">0</span></strong></p>
        <a id="whatsapp-link" href="#" class="whatsapp-btn" style="display:none;" target="_blank">Order on WhatsApp</a>
    </div>

    <!-- Search & Filter -->
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterProducts()">
    </div>

    <h1>Available Products</h1>
    <div id="product-list" class="product-container">Loading...</div>

    <script>
        let allProducts = [], cart = [];

        async function fetchProducts() {
            const res = await fetch("https://soni-mart-web.onrender.com/get-products");
            allProducts = await res.json();
            displayProducts(allProducts);
        }

        function displayProducts(arr) {
            const container = document.getElementById("product-list");
            container.innerHTML = "";
            arr.forEach(p => {
                const div = document.createElement("div");
                div.className = "product-card";
                div.innerHTML = `
                    <h3>${p.name}</h3>
                    <p>Category: ${p.category || 'General'}</p>
                    <p>₹ ${p.price}</p>
                    <button onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
                    <button class="admin-only" style="display:none;" onclick="deleteProduct('${p.id}')">Delete</button>
                `;
                container.appendChild(div);
            });
        }

        function checkAdmin() {
            if(document.getElementById("adminPass").value === "soni123") {
                document.getElementById("adminControls").style.display = "block";
                document.querySelectorAll(".admin-only").forEach(el => el.style.display = "inline-block");
            } else alert("Wrong Password!");
        }

        function addToCart(name, price) {
            const existing = cart.find(item => item.name === name);
            if(existing) existing.qty += 1;
            else cart.push({ name, price, qty: 1 });
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById("cart-items");
            const total = document.getElementById("cart-total");
            list.innerHTML = cart.map(i => `${i.name} (x${i.qty}) - ₹${i.price * i.qty}`).join("<br>");
            const totalVal = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            total.innerText = totalVal;
            
            const waLink = document.getElementById("whatsapp-link");
            if(totalVal > 0) {
                waLink.style.display = "block";
                waLink.href = `https://wa.me/91YOURNUMBER?text=Order: ${cart.map(i => i.name + ' x' + i.qty).join(', ')}. Total: ₹${totalVal}`;
            }
        }

        async function addProduct() {
            const name = document.getElementById("pName").value;
            const price = document.getElementById("pPrice").value;
            const category = document.getElementById("pCat").value;
            await fetch("https://soni-mart-web.onrender.com/add-product", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, price, category })
            });
            fetchProducts();
        }

        async function deleteProduct(id) {
            await fetch(`https://soni-mart-web.onrender.com/delete-product/${id}`, { method: 'DELETE' });
            fetchProducts();
        }

        fetchProducts();
    </script>
</body>
</html>
