<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart | Fast Delivery</title>
    <style>
        :root { --primary: #28a745; --accent: #ffc107; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        
        /* Header & Navbar */
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: bold; font-size: 20px; color: var(--primary); }
        
        /* Product Layout */
        .category-bar { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: white; }
        .cat-item { padding: 8px 15px; border-radius: 20px; background: #eee; cursor: pointer; white-space: nowrap; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #eee; }
        .card img { width: 100%; height: 100px; object-fit: contain; }
        
        /* Buttons */
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-add { background: var(--primary); color: white; }
        .btn-checkout { background: var(--accent); color: #000; position: fixed; bottom: 20px; width: 90%; left: 5%; padding: 15px; }
        
        /* Admin */
        .admin-section { padding: 20px; background: #fff3cd; margin: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Soni Mart</div>
    <div>🛒 <span id="cart-count">0</span></div>
</div>

<div class="category-bar">
    <div class="cat-item" onclick="filterProducts('All')">All</div>
    <div class="cat-item" onclick="filterProducts('Fruits')">Fruits</div>
    <div class="cat-item" onclick="filterProducts('Vegetables')">Vegetables</div>
</div>

<div id="product-list" class="grid"></div>

<div class="admin-section">
    <h3>Admin Control</h3>
    <input type="text" id="pName" placeholder="Name">
    <input type="number" id="pPrice" placeholder="Price">
    <input type="text" id="pImg" placeholder="Image URL">
    <button class="btn btn-add" onclick="addProduct()">Add Product</button>
</div>

<button class="btn btn-checkout" onclick="checkout()">Proceed to Checkout (WhatsApp)</button>

<script>
    let cart = [];
    const API = "https://soni-mart-web.onrender.com";

    async function fetchProducts() {
        const res = await fetch(`${API}/get-products`);
        const data = await res.json();
        render(data);
    }

    function render(products) {
        const list = document.getElementById("product-list");
        list.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.image || 'https://via.placeholder.com/100'}">
                <p>${p.name}</p>
                <p><strong>₹${p.price}</strong></p>
                <button class="btn btn-add" onclick="addToCart('${p.name}', ${p.price})">Add</button>
            </div>
        `).join('');
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        alert(name + " added!");
    }

    function checkout() {
        const msg = "New Order: " + cart.map(i => i.name).join(", ") + ". Total: ₹" + cart.reduce((s, i) => s + i.price, 0);
        window.open(`https://wa.me/91YOURNUMBER?text=${encodeURIComponent(msg)}`, '_blank');
    }

    async function addProduct() {
        const data = { name: document.getElementById('pName').value, price: document.getElementById('pPrice').value, image: document.getElementById('pImg').value };
        await fetch(`${API}/add-product`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(data) });
        fetchProducts();
    }

    fetchProducts();
</script>
</body>
</html>
