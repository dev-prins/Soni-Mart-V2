<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart - Complete Store</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .admin-section { background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .cart-section { background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .product-container { display: flex; flex-wrap: wrap; gap: 20px; }
        .product-card { border: 1px solid #ddd; background: white; padding: 15px; width: 200px; border-radius: 10px; text-align: center; }
        button { cursor: pointer; border: none; padding: 8px 12px; border-radius: 5px; margin-top: 5px; }
        .add-btn { background: #28a745; color: white; }
        .del-btn { background: #ff4d4d; color: white; }
        .cart-btn { background: #007bff; color: white; }
        .whatsapp-btn { background: #25d366; color: white; margin-top: 10px; display: block; width: 100%; text-decoration: none; padding: 10px; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="admin-section">
        <h2>Admin: Add Product</h2>
        <input type="text" id="pName" placeholder="Name">
        <input type="number" id="pPrice" placeholder="Price">
        <button class="add-btn" onclick="addProduct()">Add Product</button>
    </div>

    <div class="cart-section">
        <h2>🛒 My Cart</h2>
        <div id="cart-items">Empty</div>
        <p><strong>Total: ₹ <span id="cart-total">0</span></strong></p>
        <a id="whatsapp-link" href="#" class="whatsapp-btn" style="display:none;" target="_blank">Order via WhatsApp</a>
    </div>

    <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()" style="padding: 10px; width: 100%;">
    
    <h1>Available Products</h1>
    <div id="product-list" class="product-container">Loading...</div>

    <script>
        let allProducts = [];
        let cart = [];

        async function fetchProducts() {
            const res = await fetch("https://soni-mart-web.onrender.com/get-products");
            allProducts = await res.json();
            displayProducts(allProducts);
        }

        function displayProducts(arr) {
            const container = document.getElementById("product-list");
            container.innerHTML = "";
            arr.forEach(p => {
                const div = document.createElement("div");
                div.className = "product-card";
                div.innerHTML = `
                    <h3>${p.name}</h3>
                    <p>₹ ${p.price}</p>
                    <button class="cart-btn" onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
                    <button class="del-btn" onclick="deleteProduct('${p.id}')">Delete</button>
                `;
                container.appendChild(div);
            });
        }

        function filterProducts() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(query)));
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById("cart-items");
            const total = document.getElementById("cart-total");
            list.innerHTML = cart.map(item => `${item.name} - ₹${item.price}`).join("<br>");
            const totalVal = cart.reduce((sum, item) => sum + item.price, 0);
            total.innerText = totalVal;
            
            const waLink = document.getElementById("whatsapp-link");
            if(totalVal > 0) {
                waLink.style.display = "block";
                const msg = `Hello, I want to order: ${cart.map(i => i.name).join(", ")}. Total: ₹${totalVal}`;
                waLink.href = `https://wa.me/91YOURNUMBER?text=${encodeURIComponent(msg)}`;
            }
        }

        async function addProduct() {
            const name = document.getElementById("pName").value;
            const price = document.getElementById("pPrice").value;
            await fetch("https://soni-mart-web.onrender.com/add-product", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, price })
            });
            fetchProducts();
        }

        async function deleteProduct(id) {
            await fetch(`https://soni-mart-web.onrender.com/delete-product/${id}`, { method: 'DELETE' });
            fetchProducts();
        }

        fetchProducts();
    </script>
</body>
</html>
