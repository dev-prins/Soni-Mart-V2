<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart | Official Store</title>
    <style>
        /* --- 1. SETTINGS (भविष्य में यहीं से बदलें) --- */
        :root {
            --primary: #28a745; /* मुख्य हरा रंग */
            --accent: #ffc107;  /* बटन पीला रंग */
            --bg: #f8f9fa;      /* पेज बैकग्राउंड */
        }
        
        /* --- 2. STYLE (UI डिजाइन) --- */
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: bold; font-size: 22px; color: var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #eee; }
        .card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; width: 100%; }
        .admin-section { padding: 20px; background: #fff; margin: 15px; border-radius: 12px; border: 2px dashed var(--primary); }
        .btn-checkout { background: var(--accent); position: fixed; bottom: 15px; width: 92%; left: 4%; padding: 15px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">Soni Mart</div>
        <div>🛒 <span id="cart-count">0</span></div>
    </div>

    <!-- Product Display -->
    <div id="product-list" class="grid"></div>

    <!-- Admin Section -->
    <div class="admin-section">
        <h3>⚙️ Admin Panel</h3>
        <input type="text" id="pName" placeholder="Name" style="width:90%; padding:8px;">
        <input type="number" id="pPrice" placeholder="Price" style="width:90%; padding:8px; margin-top:5px;">
        <input type="text" id="pImg" placeholder="Image URL" style="width:90%; padding:8px; margin-top:5px;">
        <button class="btn-add" style="margin-top:10px;" onclick="addProduct()">Add Product</button>
    </div>

    <!-- Checkout -->
    <button class="btn-checkout" onclick="checkout()">Proceed to Checkout (Email Order)</button>

    <!-- --- 3. LOGIC (JavaScript) --- -->
    <script>
        // सेटिंग्स
        const API = "https://soni-mart-web.onrender.com";
        const ADMIN_EMAIL = "prinsplayhelp@gmail.com"; 
        let cart = [];

        async function fetchData() {
            const res = await fetch(`${API}/get-products`);
            const arr = await res.json();
            const list = document.getElementById("product-list");
            list.innerHTML = arr.map(p => `
                <div class="card">
                    <img src="${p.image || 'https://via.placeholder.com/100'}">
                    <p style="font-weight:bold;">${p.name}</p>
                    <p>₹${p.price}</p>
                    <button class="btn-add" onclick="addToCart('${p.name}', ${p.price})">Add</button>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkout() {
            if(cart.length === 0) return alert("Cart is empty!");
            const body = "Order Items: " + cart.map(i => i.name).join(", ") + " | Total: ₹" + cart.reduce((s, i) => s + i.price, 0);
            window.location.href = `mailto:${ADMIN_EMAIL}?subject=New Order!&body=${encodeURIComponent(body)}`;
        }

        async function addProduct() {
            const data = { 
                name: document.getElementById('pName').value, 
                price: document.getElementById('pPrice').value, 
                image: document.getElementById('pImg').value 
            };
            await fetch(`${API}/add-product`, { 
                method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(data) 
            });
            fetchData();
        }

        fetchData();
    </script>
</body>
</html>
