<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soni Mart - Products</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .product-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .product-card { border: 1px solid #ddd; border-radius: 10px; padding: 15px; width: 200px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); text-align: center; }
        .product-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .product-price { color: #2e7d32; font-weight: bold; margin-bottom: 10px; }
        button { background-color: #ff4d4d; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #cc0000; }
    </style>
</head>
<body>

    <h1>Our Products</h1>
    <div id="product-list" class="product-container">
        <p>Loading...</p>
    </div>

    <script>
        async function fetchProducts() {
            try {
                const response = await fetch("https://soni-mart-web.onrender.com/get-products");
                const products = await response.json();
                const container = document.getElementById("product-list");
                container.innerHTML = "";

                products.forEach(p => {
                    const div = document.createElement("div");
                    div.className = "product-card";
                    div.innerHTML = `
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">₹ ${p.price}</div>
                        <button onclick="deleteProduct('${p.id}')">Delete</button>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                document.getElementById("product-list").innerHTML = "Error loading products.";
            }
        }

        async function deleteProduct(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                try {
                    const response = await fetch(`https://soni-mart-web.onrender.com/delete-product/${id}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert("Product deleted!");
                        fetchProducts(); // लिस्ट को रिफ्रेश करें
                    } else {
                        alert("Failed to delete.");
                    }
                } catch (err) {
                    alert("Error: " + err.message);
                }
            }
        }

        fetchProducts();
    </script>
</body>
</html>
